version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: nexusdial-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: nexusdial
    ports:
      - "5432:5432"
    volumes:
      - nexusdial_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: nexusdial-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  nexusdial_postgres_data:


























